app = 'seylan-status-agent'
primary_region = 'sin'
org = 'suven-seoras'

[build]
  dockerfile = 'Dockerfile'

[env]
  SEYLAN_BACKEND_URL = 'https://seylan-hub-api.fly.dev'
  CHECK_TIMEOUT_SECONDS = '8.0'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
